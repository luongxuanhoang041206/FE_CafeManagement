<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/forgot-password.css">
    <link rel="stylesheet" href="../css/reset-password.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../component/component.css">
</head>

<body>
    <div id="navbar-placeholder"></div>

    <div class="sign_in forgot_password_page reset_password_page">
        <div class="image">
            <img src="../image/loginImages/side_picture1.avif" alt="Coffee cup and beans">
        </div>
        <form id="resetPasswordForm" class="form_signin" action="#" method="post">
            <div class="head_form">
                <p class="eyebrow">Account recovery</p>
                <h1 class="title">Create your new password</h1>
                <p class="description" id="tokenStatusText">
                    We are checking your reset link now.
                </p>
            </div>

            <div class="body_form">
                <div class="left forgot_password_content reset_password_content">
                    <div class="token_preview">
                        <label for="tokenPreview">Reset token</label>
                        <input type="text" id="tokenPreview" readonly>
                    </div>

                    <div class="password_field">
                        <label for="newPassword">New password</label>
                        <input type="password" id="newPassword" placeholder="Enter your new password" required>
                        <span></span>
                    </div>

                    <div class="password_field">
                        <label for="confirmPassword">Confirm password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm your new password" required>
                        <span></span>
                    </div>

                    <p class="help_text" id="resetHelpText">
                        Open this page using the email link format:
                        <code>/client/pages/reset-password.html?token=...</code>
                    </p>
                </div>
            </div>

            <div class="foot_form">
                <button id="resetPasswordBtn" type="submit">Reset password</button>
                <p>Need another link? <a href="forgot-password.html"><span class="log">Request again</span></a></p>
            </div>
        </form>
    </div>

    <div id="footer-placeholder"></div>

    <script src="../component/component.js"></script>
    <script src="../js/reset-password.js" defer></script>
</body>

</html>
