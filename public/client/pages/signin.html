<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="../css/login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Lexend+Giga:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../component/component.css">

</head>
<body>
<div id="navbar-placeholder"></div>

    <div class="sign_in">
        <div class="image">
            <img src="../image/loginImages/side_picture.avif" alt="image">
        </div>
        <form id="form" class="form_signin" action="#" method="get">
            <div class="head_form">
                <h1 class="title">This is the online service. We need your information for product, sale and support if you need </h1>
                <p class="description">You know you want to</p>
            </div>
            <div class="body_form">
                <div class="left">
                    <div class="firstname">
                        <label for="fname">First Name</label>
                        <input type="text" name="fname" id="fname" required>
                        <span></span>
                    </div>
                    <div class="lastname">
                        <label for="lname">Last Name</label>
                        <input type="text" name="lname" id="lname" required>
                        <span></span>
                    </div>
                    <div class="email_user">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="abc@gmail.com" required>
                        <span></span>
                    </div>
                </div>
                <div class="right">
                    <div class="phone_number">
                        <label for="phone">Phone Number(option)</label>
                        <input type="tel" name="phone" id="phone" placeholder="0123-456-7890">
                        <span></span>
                    </div>
                    <div class="password_field">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" placeholder="XXXXXXXX" required minlength="8" maxlength="100">
                        <span></span>

                        <ul class="password_rule">
                            <li id="length">at least 8 character</li>
                            <li id="number">at least 1 number</li>
                            <li id="character">at least 1 alphabet</li>
                        </ul>
                    </div>
                    <div class="confirm_password">
                        <label for="confirm">Confirm Password</label>
                        <input type="password" name="confirm" id="confirm" placeholder="XXXXXXXX" required maxlength="10">
                        <span></span>
                    </div>
                </div>
            </div>
            <div class="foot_form">
                <button id="btn" type="submit">Sign in</button>
                <p>Already have an account? <a href="login.html"><span class="log">Log in</span></a></p>
            </div>
        </form>
    </div>
<div id="footer-placeholder"></div>
<script src="../component/component.js"></script>

    <script src="../js/login.js" defer></script>

</body>
</html>
