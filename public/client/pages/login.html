<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="../css/login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../component/component.css">
</head>

<body>
    <div id="navbar-placeholder"></div>

    <div class="sign_in">
        <div class="image">
            <img src="../image/loginImages/side_picture.avif" alt="Decorative side image">
        </div>
        <form id="form" class="form_signin" action="#" method="get">
            <div class="head_form">
                <h1 class="title">Chào mừng trở lại.</h1>

                <p class="description">Vui lòng đăng nhập để tiếp tục</p>
            </div>
            <div class="body_form">
                <div class="left">
                    <div class="email_user">
                        <label for="loginKey">Tên đăng nhập</label>
                        <input type="" name="" id="loginKey" placeholder="Nhập tên đăng nhập" required>
                        <span></span>
                    </div>
                </div>
                <div class="right">
                    <div class="password_field">
                        <label for="password">Mật khẩu</label>
                        <input type="password" name="password" id="password" placeholder="XXXXXXXX" required
                            minlength="6" maxlength="100">
                        <span></span>
                    </div>
                </div>
            </div>
            <div class="foot_form">
                <button id="btn" type="submit">Đăng nhập</button>
                <p><a href="forgot-password.html"><span class="log">Quên mật khẩu?</span></a></p>
                <p>Bạn chưa có tài khoản? <a href="signin.html"><span class="sign">Đăng ký ngay</span></a></p>
            </div>
        </form>
    </div>

    <div id="footer-placeholder"></div>

    <script src="../component/component.js"></script>
    <script src="../js/login.js" defer></script>
</body>

</html>
