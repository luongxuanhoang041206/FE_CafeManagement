<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/client/pages/">
    <title>Quên mật khẩu</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/forgot-password.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../component/component.css">
</head>

<body>
    <div id="navbar-placeholder"></div>

    <div class="sign_in forgot_password_page">
        <div class="image">
            <img src="../image/loginImages/side_picture1.avif" alt="Coffee cup and beans">
        </div>
        <form id="forgotPasswordForm" class="form_signin" action="#" method="post">
            <div class="head_form">
                <p class="eyebrow">Khôi phục tài khoản</p>
                <h1 class="title">Quên mật khẩu?</h1>
                <p class="description">
                    Nhập email hoặc tên đăng nhập và chúng tôi sẽ gửi yêu cầu đặt lại mật khẩu cho bạn.
                </p>
            </div>

            <div class="body_form">
                <div class="left forgot_password_content">
                    <div class="email_user">
                        <label for="accountInfo">Email hoặc tên đăng nhập</label>
                        <input type="text" id="accountInfo" placeholder="Nhập email hoặc tên đăng nhập" required>
                        <span></span>
                    </div>
                    <p class="help_text">
                        Khi nhấn gửi yêu cầu, một email chứa liên kết dùng để đặt lại mật khẩu sẽ gửi đến hòm thư của bạn. Vui lòng kiểm tra cả thư rác.
                    </p>
                </div>
            </div>

            <div class="foot_form">
                <button id="forgotPasswordBtn" type="submit">Gửi yêu cầu khôi phục</button>
                <p>Đã nhớ ra mật khẩu? <a href="login.html"><span class="log">Quay lại đăng nhập</span></a></p>
            </div>
        </form>
    </div>

    <div id="footer-placeholder"></div>

    <script src="../component/component.js"></script>
    <script src="../js/forgot-password.js" defer></script>
</body>

</html>
