<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/forgot-password.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../component/component.css">
</head>

<body>
    <div id="navbar-placeholder"></div>

    <div class="sign_in forgot_password_page">
        <div class="image">
            <img src="../image/loginImages/side_picture1.avif" alt="Coffee cup and beans">
        </div>
        <form id="forgotPasswordForm" class="form_signin" action="#" method="post">
            <div class="head_form">
                <p class="eyebrow">Account recovery</p>
                <h1 class="title">Forgot your password?</h1>
                <p class="description">
                    Enter your email or username and we will request a reset token for your account.
                </p>
            </div>

            <div class="body_form">
                <div class="left forgot_password_content">
                    <div class="email_user">
                        <label for="accountInfo">Email or username</label>
                        <input type="text" id="accountInfo" placeholder="Enter your email or username" required>
                        <span></span>
                    </div>
                    <p class="help_text">
                        Based on the API docs, this page sends your input as the <code>info</code> field to the forgot
                        password endpoint.
                    </p>
                </div>
            </div>

            <div class="foot_form">
                <button id="forgotPasswordBtn" type="submit">Send reset request</button>
                <p>Remembered your password? <a href="login.html"><span class="log">Back to login</span></a></p>
            </div>
        </form>
    </div>

    <div id="footer-placeholder"></div>

    <script src="../component/component.js"></script>
    <script src="../js/forgot-password.js" defer></script>
</body>

</html>
